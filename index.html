<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verhal — Learn without limits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy-950:#070B14;
  --navy-900:#0B1220;
  --navy-800:#121A2E;
  --navy-700:#1B2540;
  --navy-600:#263155;
  --gold-500:#D4AF37;
  --gold-300:#E8CC7A;
  --gold-700:#8f7420;
  --ink-50:#F5F3EC;
  --ink-300:#B9C0D0;
  --ink-500:#7C88A3;
  --success:#3FB68B;
  --danger:#E2604F;
  --radius:10px;
  --font-display:'Fraunces',serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
[data-theme="light"]{
  --navy-950:#F7F5EF;
  --navy-900:#FFFFFF;
  --navy-800:#F1EEE4;
  --navy-700:#E3DFD1;
  --navy-600:#CFC9B4;
  --ink-50:#141A26;
  --ink-300:#3E4557;
  --ink-500:#6B7284;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  background:var(--navy-900);
  color:var(--ink-50);
  font-family:var(--font-body);
  transition:background .25s ease, color .25s ease;
  min-height:100vh;
}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
img{max-width:100%;display:block;}
::selection{background:var(--gold-500);color:var(--navy-950);}
@media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }

h1,h2,h3,h4{font-family:var(--font-display);font-weight:600;margin:0 0 .4em;line-height:1.15;}
.eyebrow{
  font-family:var(--font-mono);
  font-size:.72rem;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--gold-500);
  display:flex;align-items:center;gap:.5em;
}
.eyebrow::before{content:"";width:18px;height:1px;background:var(--gold-500);display:inline-block;}

.container{max-width:1180px;margin:0 auto;padding:0 24px;}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.5em;
  padding:.85em 1.5em;border-radius:8px;border:1px solid transparent;
  font-weight:600;font-size:.92rem;transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
}
.btn-primary{background:var(--gold-500);color:var(--navy-950);}
.btn-primary:hover{background:var(--gold-300);transform:translateY(-1px);}
.btn-outline{border-color:var(--navy-600);color:var(--ink-50);background:transparent;}
.btn-outline:hover{border-color:var(--gold-500);color:var(--gold-500);}
.btn-ghost{background:transparent;color:var(--ink-300);}
.btn-ghost:hover{color:var(--ink-50);}
.btn-block{width:100%;}
.btn-sm{padding:.55em 1em;font-size:.82rem;}
.btn-danger{background:transparent;border-color:var(--danger);color:var(--danger);}
.btn-danger:hover{background:var(--danger);color:var(--navy-950);}
.btn[disabled]{opacity:.5;cursor:not-allowed;transform:none;}

/* Nav */
header.topnav{
  position:sticky;top:0;z-index:50;
  background:color-mix(in srgb, var(--navy-900) 88%, transparent);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--navy-700);
}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;max-width:1180px;margin:0 auto;}
.brand{display:flex;align-items:center;gap:.6em;font-family:var(--font-display);font-size:1.35rem;font-weight:700;letter-spacing:.01em;}
.brand .mark{
  width:30px;height:30px;border-radius:6px;
  background:linear-gradient(160deg,var(--gold-300),var(--gold-700));
  display:flex;align-items:center;justify-content:center;color:var(--navy-950);font-family:var(--font-display);font-weight:700;
}
.nav-links{display:flex;align-items:center;gap:28px;}
.nav-links a{font-size:.92rem;color:var(--ink-300);font-weight:500;}
.nav-links a:hover, .nav-links a.active{color:var(--ink-50);}
.nav-actions{display:flex;align-items:center;gap:12px;}
.icon-btn{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--navy-700);background:transparent;
  color:var(--ink-300);display:flex;align-items:center;justify-content:center;
}
.icon-btn:hover{color:var(--gold-500);border-color:var(--gold-500);}
.avatar-chip{display:flex;align-items:center;gap:.6em;padding:.4em .7em .4em .4em;border-radius:99px;border:1px solid var(--navy-700);}
.avatar-chip .dot{width:26px;height:26px;border-radius:99px;background:var(--gold-500);color:var(--navy-950);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;font-family:var(--font-mono);}
.avatar-chip span{font-size:.85rem;font-weight:600;}
.mobile-toggle{display:none;background:none;border:none;color:var(--ink-50);font-size:1.4rem;}

@media (max-width:900px){
  .nav-links{position:fixed;top:64px;left:0;right:0;background:var(--navy-900);border-bottom:1px solid var(--navy-700);flex-direction:column;padding:16px 24px;gap:16px;transform:translateY(-130%);transition:transform .25s ease;}
  .nav-links.open{transform:translateY(0);}
  .mobile-toggle{display:block;}
}

/* Hero */
.hero{padding:96px 0 80px;position:relative;overflow:hidden;}
.hero::before{
  content:"";position:absolute;inset:-20% -10% auto -10%;height:500px;
  background:radial-gradient(ellipse at 30% 20%, color-mix(in srgb, var(--gold-500) 16%, transparent), transparent 60%);
  pointer-events:none;
}
.hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:56px;align-items:center;position:relative;}
.hero h1{font-size:clamp(2.2rem,4.2vw,3.4rem);}
.hero h1 em{font-style:normal;color:var(--gold-500);}
.hero p.lead{color:var(--ink-300);font-size:1.08rem;max-width:44ch;margin:18px 0 30px;}
.hero-ctas{display:flex;gap:14px;margin-bottom:34px;flex-wrap:wrap;}
.hero-stats{display:flex;gap:34px;flex-wrap:wrap;}
.hero-stats div b{display:block;font-family:var(--font-mono);font-size:1.4rem;color:var(--gold-500);}
.hero-stats div span{font-size:.78rem;color:var(--ink-500);}

/* Catalog stack — signature element: fanned index-card deck */
.card-deck{position:relative;height:380px;}
.deck-card{
  position:absolute;width:280px;padding:20px;border-radius:var(--radius);
  background:var(--navy-800);border:1px solid var(--navy-700);
  box-shadow:0 20px 40px -18px rgba(0,0,0,.5);
}
.deck-card .ribbon{position:absolute;top:0;left:20px;width:14px;height:34px;background:var(--gold-500);clip-path:polygon(0 0,100% 0,100% 100%,50% 78%,0 100%);}
.deck-card h4{font-size:1rem;margin-bottom:6px;}
.deck-card p{font-size:.8rem;color:var(--ink-500);margin:0 0 10px;}
.deck-card .bar{height:5px;border-radius:99px;background:var(--navy-700);overflow:hidden;}
.deck-card .bar i{display:block;height:100%;background:var(--gold-500);}
.deck-1{top:0;left:60px;transform:rotate(-6deg);z-index:1;}
.deck-2{top:40px;left:10px;transform:rotate(3deg);z-index:2;}
.deck-3{top:90px;left:80px;transform:rotate(-2deg);z-index:3;}
@media (max-width:900px){ .card-deck{display:none;} .hero-grid{grid-template-columns:1fr;} }

/* Sections */
section.block{padding:70px 0;}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:34px;gap:20px;flex-wrap:wrap;}
.section-head h2{font-size:clamp(1.6rem,3vw,2.1rem);}

.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
@media (max-width:900px){.grid-3{grid-template-columns:1fr 1fr;} .grid-4{grid-template-columns:1fr 1fr;}}
@media (max-width:600px){.grid-3{grid-template-columns:1fr;} .grid-4{grid-template-columns:1fr;}}

/* Course card */
.course-card{
  background:var(--navy-800);border:1px solid var(--navy-700);border-radius:var(--radius);
  overflow:hidden;display:flex;flex-direction:column;transition:transform .18s ease, border-color .18s ease;position:relative;
}
.course-card:hover{transform:translateY(-4px);border-color:var(--gold-700);}
.course-thumb{height:130px;position:relative;display:flex;align-items:flex-end;padding:14px;}
.course-thumb .cat{font-family:var(--font-mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;background:rgba(0,0,0,.35);padding:.3em .7em;border-radius:99px;color:#fff;}
.course-body{padding:16px 18px 20px;flex:1;display:flex;flex-direction:column;gap:8px;}
.course-body h4{font-size:1.02rem;margin:0;}
.course-meta{display:flex;justify-content:space-between;align-items:center;font-size:.78rem;color:var(--ink-500);}
.stars{color:var(--gold-500);font-size:.82rem;}
.course-foot{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:10px;border-top:1px dashed var(--navy-700);}
.price{font-family:var(--font-mono);font-weight:600;color:var(--gold-500);}
.price.free{color:var(--success);}
.badge{font-size:.68rem;font-family:var(--font-mono);padding:.25em .6em;border-radius:5px;border:1px solid var(--navy-600);color:var(--ink-500);}

/* progress ribbon signature */
.progress-ribbon{position:relative;height:8px;background:var(--navy-700);border-radius:99px;overflow:hidden;}
.progress-ribbon i{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--gold-700),var(--gold-500));border-radius:99px;}
.progress-label{display:flex;justify-content:space-between;font-size:.74rem;color:var(--ink-500);margin-top:6px;font-family:var(--font-mono);}

/* Testimonials */
.testi-card{background:var(--navy-800);border:1px solid var(--navy-700);border-radius:var(--radius);padding:24px;}
.testi-card p{color:var(--ink-300);font-size:.94rem;line-height:1.6;}
.testi-who{display:flex;align-items:center;gap:10px;margin-top:16px;}
.testi-who .dot{width:34px;height:34px;border-radius:99px;background:var(--navy-700);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-mono);color:var(--gold-500);}
.testi-who small{color:var(--ink-500);display:block;}

footer{border-top:1px solid var(--navy-700);padding:40px 0;margin-top:40px;}
.foot-grid{display:flex;justify-content:space-between;flex-wrap:wrap;gap:20px;color:var(--ink-500);font-size:.85rem;}

/* Filters / listing */
.filter-bar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:28px;padding:16px;background:var(--navy-800);border:1px solid var(--navy-700);border-radius:var(--radius);}
select, input[type=text], input[type=email], input[type=password], input[type=number], textarea{
  background:var(--navy-900);border:1px solid var(--navy-700);color:var(--ink-50);
  padding:.7em .9em;border-radius:7px;font-family:inherit;font-size:.88rem;outline:none;
}
select:focus, input:focus, textarea:focus{border-color:var(--gold-500);box-shadow:0 0 0 3px color-mix(in srgb, var(--gold-500) 20%, transparent);}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field label{font-size:.8rem;color:var(--ink-300);font-weight:600;}
.field small.err{color:var(--danger);font-size:.76rem;}
.field.has-err input, .field.has-err select{border-color:var(--danger);}

/* Page header */
.page-head{padding:50px 0 30px;border-bottom:1px solid var(--navy-700);}
.breadcrumb{font-size:.8rem;color:var(--ink-500);margin-bottom:14px;font-family:var(--font-mono);}
.breadcrumb a:hover{color:var(--gold-500);}

/* Course detail */
.detail-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:40px;align-items:start;padding:40px 0 80px;}
@media (max-width:900px){.detail-grid{grid-template-columns:1fr;}}
.curriculum-item{border:1px solid var(--navy-700);border-radius:8px;margin-bottom:10px;overflow:hidden;}
.curriculum-head{display:flex;justify-content:space-between;padding:14px 16px;background:var(--navy-800);cursor:pointer;font-weight:600;font-size:.92rem;}
.lesson-row{display:flex;justify-content:space-between;padding:10px 18px;font-size:.85rem;color:var(--ink-300);border-top:1px solid var(--navy-700);}
.lesson-row .l-left{display:flex;align-items:center;gap:10px;}
.sticky-card{position:sticky;top:90px;background:var(--navy-800);border:1px solid var(--navy-700);border-radius:var(--radius);padding:24px;}
.sticky-card .big-price{font-family:var(--font-mono);font-size:1.8rem;color:var(--gold-500);margin-bottom:14px;}
.instructor-strip{display:flex;align-items:center;gap:12px;margin:20px 0;padding:14px;border:1px dashed var(--navy-700);border-radius:8px;}
.trust-row{display:flex;gap:16px;margin-top:16px;font-size:.76rem;color:var(--ink-500);flex-wrap:wrap;}
.trust-row span{display:flex;align-items:center;gap:6px;}

/* Auth */
.auth-wrap{max-width:440px;margin:70px auto 100px;padding:0 24px;}
.auth-card{background:var(--navy-800);border:1px solid var(--navy-700);border-radius:var(--radius);padding:34px;}
.role-toggle{display:flex;gap:8px;margin-bottom:22px;background:var(--navy-900);border:1px solid var(--navy-700);border-radius:8px;padding:4px;}
.role-toggle button{flex:1;padding:.65em;border-radius:6px;border:none;background:transparent;color:var(--ink-500);font-weight:600;font-size:.85rem;}
.role-toggle button.active{background:var(--gold-500);color:var(--navy-950);}
.auth-switch{text-align:center;margin-top:18px;font-size:.86rem;color:var(--ink-500);}
.auth-switch a{color:var(--gold-500);font-weight:600;}
.demo-note{background:var(--navy-900);border:1px dashed var(--navy-600);border-radius:8px;padding:12px 14px;font-size:.78rem;color:var(--ink-500);margin-bottom:20px;}

/* Dashboards */
.dash-shell{display:grid;grid-template-columns:250px 1fr;gap:0;min-height:70vh;}
@media (max-width:860px){.dash-shell{grid-template-columns:1fr;}}
.dash-side{border-right:1px solid var(--navy-700);padding:28px 18px;}
@media (max-width:860px){.dash-side{border-right:none;border-bottom:1px solid var(--navy-700);display:flex;overflow-x:auto;gap:6px;padding:14px 18px;}}
.dash-side .who{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--navy-700);}
@media (max-width:860px){.dash-side .who{display:none;}}
.dash-side .who .dot{width:42px;height:42px;border-radius:99px;background:var(--gold-500);color:var(--navy-950);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-mono);}
.dash-side .who b{display:block;}
.dash-side .who small{color:var(--ink-500);}
.dash-nav a{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;color:var(--ink-300);font-size:.9rem;font-weight:500;margin-bottom:4px;white-space:nowrap;}
.dash-nav a:hover{background:var(--navy-800);color:var(--ink-50);}
.dash-nav a.active{background:color-mix(in srgb, var(--gold-500) 14%, transparent);color:var(--gold-500);}
.dash-main{padding:34px 30px;}
.dash-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px;flex-wrap:wrap;gap:14px;}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:30px;}
@media (max-width:760px){.stat-row{grid-template-columns:1fr 1fr;}}
.stat-card{background:var(--navy-800);border:1px solid var(--navy-700);border-radius:var(--radius);padding:18px;}
.stat-card b{display:block;font-family:var(--font-mono);font-size:1.5rem;color:var(--gold-500);}
.stat-card span{font-size:.78rem;color:var(--ink-500);}
table{width:100%;border-collapse:collapse;font-size:.87rem;}
table th{text-align:left;color:var(--ink-500);font-weight:600;font-size:.76rem;text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;border-bottom:1px solid var(--navy-700);}
table td{padding:12px;border-bottom:1px solid var(--navy-700);color:var(--ink-300);}
.table-wrap{background:var(--navy-800);border:1px solid var(--navy-700);border-radius:var(--radius);overflow:hidden;overflow-x:auto;}
.pill{padding:.25em .7em;border-radius:99px;font-size:.72rem;font-weight:600;font-family:var(--font-mono);}
.pill.ok{background:color-mix(in srgb, var(--success) 20%, transparent);color:var(--success);}
.pill.warn{background:color-mix(in srgb, var(--gold-500) 20%, transparent);color:var(--gold-500);}
.pill.fail{background:color-mix(in srgb, var(--danger) 20%, transparent);color:var(--danger);}
.enroll-row{display:flex;gap:16px;background:var(--navy-800);border:1px solid var(--navy-700);border-radius:var(--radius);padding:16px;margin-bottom:14px;align-items:center;}
.enroll-row .thumb{width:70px;height:56px;border-radius:6px;flex-shrink:0;}
.enroll-row .body{flex:1;min-width:0;}
.enroll-row h4{margin:0 0 6px;font-size:.95rem;}
.empty-state{text-align:center;padding:60px 20px;color:var(--ink-500);}
.empty-state .glyph{font-size:2.4rem;margin-bottom:10px;}

/* Lesson viewer */
.lesson-shell{display:grid;grid-template-columns:1fr 300px;gap:0;}
@media (max-width:900px){.lesson-shell{grid-template-columns:1fr;}}
.lesson-player{background:#000;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;color:var(--ink-500);border-radius:var(--radius) 0 0 var(--radius);}
@media (max-width:900px){.lesson-player{border-radius:var(--radius);}}
.lesson-content{padding:22px;background:var(--navy-800);border:1px solid var(--navy-700);border-top:none;}
.lesson-sidebar{border:1px solid var(--navy-700);border-left:none;padding:16px;max-height:520px;overflow-y:auto;}
@media (max-width:900px){.lesson-sidebar{border-left:1px solid var(--navy-700);border-top:none;}}
.lesson-list-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:7px;font-size:.85rem;cursor:pointer;color:var(--ink-300);}
.lesson-list-item:hover{background:var(--navy-700);}
.lesson-list-item.current{background:color-mix(in srgb, var(--gold-500) 14%, transparent);color:var(--gold-500);}
.check-circ{width:20px;height:20px;border-radius:99px;border:1.5px solid var(--navy-600);display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;}
.check-circ.done{background:var(--success);border-color:var(--success);color:#fff;}

/* Quiz */
.quiz-card{background:var(--navy-800);border:1px solid var(--navy-700);border-radius:var(--radius);padding:28px;max-width:680px;margin:0 auto;}
.quiz-progress{font-family:var(--font-mono);font-size:.76rem;color:var(--ink-500);margin-bottom:8px;}
.opt-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--navy-700);border-radius:8px;margin-bottom:10px;cursor:pointer;}
.opt-row:hover{border-color:var(--gold-700);}
.opt-row.selected{border-color:var(--gold-500);background:color-mix(in srgb, var(--gold-500) 10%, transparent);}
.opt-row.correct{border-color:var(--success);background:color-mix(in srgb, var(--success) 12%, transparent);}
.opt-row.incorrect{border-color:var(--danger);background:color-mix(in srgb, var(--danger) 12%, transparent);}
.opt-letter{width:26px;height:26px;border-radius:6px;background:var(--navy-700);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:.78rem;flex-shrink:0;}
.quiz-result-ring{width:130px;height:130px;border-radius:99px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:1.6rem;font-weight:700;border:6px solid var(--navy-700);}
.quiz-result-ring.pass{border-color:var(--success);color:var(--success);}
.quiz-result-ring.fail{border-color:var(--danger);color:var(--danger);}

/* Checkout */
.checkout-steps{display:flex;gap:0;margin-bottom:36px;max-width:520px;}
.co-step{flex:1;text-align:center;font-size:.76rem;color:var(--ink-500);font-family:var(--font-mono);position:relative;padding-bottom:14px;}
.co-step::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--navy-700);}
.co-step.active{color:var(--gold-500);}
.co-step.active::after, .co-step.done::after{background:var(--gold-500);}
.pay-method{display:flex;align-items:center;gap:14px;padding:16px;border:1.5px solid var(--navy-700);border-radius:8px;margin-bottom:12px;cursor:pointer;}
.pay-method:hover{border-color:var(--gold-700);}
.pay-method.selected{border-color:var(--gold-500);background:color-mix(in srgb, var(--gold-500) 8%, transparent);}
.pay-method .logo{width:44px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.7rem;font-family:var(--font-mono);color:#fff;}
.summary-line{display:flex;justify-content:space-between;padding:10px 0;font-size:.9rem;color:var(--ink-300);border-bottom:1px dashed var(--navy-700);}

.status-icon.fail{background:color-mix(in srgb, var(--danger) 20%, transparent);color:var(--danger);}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--navy-800);border:1px solid var(--gold-500);color:var(--ink-50);padding:12px 20px;border-radius:8px;font-size:.86rem;z-index:200;transition:transform .3s ease;box-shadow:0 10px 30px rgba(0,0,0,.4);}

.hidden{display:none !important;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

.tab-row{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid var(--navy-700);flex-wrap:wrap;}
.tab-btn{padding:10px 4px;margin-right:20px;background:none;border:none;color:var(--ink-500);font-weight:600;font-size:.88rem;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab-btn.active{color:var(--gold-500);border-color:var(--gold-500);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:150;padding:20px;}
.modal-box{background:var(--navy-800);border:1px solid var(--navy-700);border-radius:var(--radius);padding:26px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;}
.modal-box h3{margin-bottom:18px;}
.close-x{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--ink-500);font-size:1.3rem;}

function loadDB(){
  let raw = localStorage.getItem(DB_KEY);
  if(!raw){ const db = seedDB(); localStorage.setItem(DB_KEY, JSON.stringify(db)); return db; }
  try{ return JSON.parse(raw); }catch(e){ const db = seedDB(); localStorage.setItem(DB_KEY, JSON.stringify(db)); return db; }
}
function saveDB(db){ localStorage.setItem(DB_KEY, JSON.stringify(db)); }
let DB = loadDB();

function getSession(){ try{ return JSON.parse(localStorage.getItem(SESSION_KEY)); }catch(e){ return null; } }
function setSession(userId){ localStorage.setItem(SESSION_KEY, JSON.stringify({userId})); }
function clearSession(){ localStorage.removeItem(SESSION_KEY); }
function currentUser(){ const s = getSession(); if(!s) return null; return DB.users.find(u=>u.id===s.userId) || null; }

function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(window._toastT); window._toastT=setTimeout(()=>t.classList.remove('show'),2600);
}

/* ======================= ROUTER ======================= */
function route(){
  const hash = location.hash || '#/home';
  const parts = hash.replace('#/','').split('/');
  const view = parts[0] || 'home';
  renderNav(view);
  const app = document.getElementById('app');
  window.scrollTo({top:0});
  switch(view){
    case 'home': app.innerHTML = viewHome(); afterHome(); break;
    case 'courses': app.innerHTML = viewCourses(); afterCourses(); break;
    case 'course': app.innerHTML = viewCourseDetail(parts[1]); afterCourseDetail(parts[1]); break;
    case 'login': app.innerHTML = viewAuth('login'); afterAuth('login'); break;
    case 'register': app.innerHTML = viewAuth('register'); afterAuth('register'); break;
    case 'checkout': app.innerHTML = viewCheckout(parts[1]); afterCheckout(parts[1]); break;
    case 'lesson': app.innerHTML = viewLesson(parts[1], parts[2]); afterLesson(parts[1], parts[2]); break;
    case 'quiz': app.innerHTML = viewQuiz(parts[1]); afterQuiz(parts[1]); break;
    case 'certificate': app.innerHTML = viewCertificate(parts[1]); afterCertificate(parts[1]); break;
    case 'editor': app.innerHTML = viewCourseEditor(parts[1]); afterCourseEditor(parts[1]); break;
    case 'dashboard': app.innerHTML = viewDashboardGate(parts[1]); afterDashboard(parts[1], parts[2]); break;
    default: app.innerHTML = '<div class="container" style="padding:80px 0;text-align:center;color:var(--ink-500)">Page not found.</div>';
  }
}
window.addEventListener('hashchange', route);

function renderNav(view){
  document.querySelectorAll('[data-nav]').forEach(a=>a.classList.remove('active'));
  const map={home:'home',courses:'courses',dashboard:'student'};
  const u = currentUser();
  const authArea = document.getElementById('authArea');
  if(u){
    authArea.innerHTML = `<a href="#/dashboard/${u.role}" class="avatar-chip"><span class="dot">${u.name.charAt(0)}</span><span>${u.name.split(' ')[0]}</span></a>
      <button class="btn btn-ghost btn-sm" id="logoutBtn" style="margin-left:8px">Log out</button>`;
    document.getElementById('logoutBtn').onclick=()=>{ clearSession(); toast('Logged out.'); location.hash='#/home'; };
    const studentLink = document.querySelector('[data-nav="student"]');
    const instLink = document.querySelector('[data-nav="instructor"]');
    if(studentLink) studentLink.style.display = u.role==='student' ? '' : 'none';
    if(instLink) instLink.style.display = u.role==='instructor' ? '' : 'none';
  } else {
    authArea.innerHTML = `<a href="#/login" class="btn btn-ghost btn-sm">Log in</a><a href="#/register" class="btn btn-primary btn-sm">Sign up</a>`;
    const studentLink = document.querySelector('[data-nav="student"]');
    const instLink = document.querySelector('[data-nav="instructor"]');
    if(studentLink) studentLink.style.display = 'none';
    if(instLink) instLink.style.display = 'none';
  }
  const activeMap = {home:'home',courses:'courses'};
  if(activeMap[view]){ const el = document.querySelector('[data-nav="'+activeMap[view]+'"]'); if(el) el.classList.add('active'); }
  document.getElementById('navLinks').classList.remove('open');
}

/* ======================= HOME ======================= */
function stars(n){ const full=Math.round(n); return '★★★★★☆☆☆☆☆'.slice(5-full,10-full); }

    <div class="container hero-grid">

        <div class="deck-card deck-2"><div class="ribbon"></div><h4>${featured[1].title}</h4><p>${featured[1].category}</p><div class="bar"><i style="width:40%"></i></div></div>
        <div class="deck-card deck-3"><div class="ribbon"></div><h4>${featured[2].title}</h4><p>${featured[2].category}</p><div class="bar"><i style="width:90%"></i></div></div>
      </div>
    </div>
  </section>

  <section class="block">
    <div class="container">
      <div class="section-head">
        <div><div class="eyebrow">Catalog</div><h2>Featured courses</h2></div>
        <a href="#/courses" class="btn btn-outline btn-sm">View all courses</a>
      </div>
      <div class="grid-3">${featured.map(courseCard).join('')}</div>
    </div>
  </section>

  <section class="block" style="background:var(--navy-950);border-top:1px solid var(--navy-700);border-bottom:1px solid var(--navy-700);">
    <div class="container">
      <div class="section-head"><div><div class="eyebrow">Testimonials</div><h2>What learners are saying</h2></div></div>

        ${testimonials.map(t=>`<div class="testi-card"><p>"${t.text}"</p><div class="testi-who"><div class="dot">${t.name.charAt(0)}</div><div><b>${t.name}</b><small>${t.role}</small></div></div></div>`).join('')}
      </div>
    </div>
  </section>

  <section class="block">
    <div class="container" style="text-align:center;">
      <h2 style="max-width:24ch;margin:0 auto 16px;">Ready to start your next chapter?</h2>
      <p style="color:var(--ink-300);max-width:44ch;margin:0 auto 26px;">Join as a student to start learning today, or as an instructor to publish your own course.</p>
      <div class="hero-ctas" style="justify-content:center;">
        <a href="#/register" class="btn btn-primary">Create a free account</a>
      </div>
    </div>
  </section>
  `;
}
function afterHome(){}

function courseCard(c){
  const priceHtml = c.price===0 ? `<span class="price free">Free</span>` : `<span class="price">৳${c.price.toLocaleString()}</span>`;
  return `
  <a href="#/course/${c.id}" class="course-card">
    <div class="course-thumb" style="background:${c.color}"><span class="cat">${c.category}</span></div>
    <div class="course-body">
      <h4>${c.title}</h4>
      <div class="course-meta"><span>${c.instructorName}</span><span class="stars">${stars(c.rating)} ${c.rating}</span></div>
      <div class="course-foot"><span class="badge">${c.level}</span>${priceHtml}</div>
    </div>
  </a>`;
}

/* ======================= COURSE LISTING ======================= */
let listingFilters = {category:'all', level:'all', price:'all', q:''};
function viewCourses(){
  const categories = [...new Set(DB.courses.map(c=>c.category))];
  return `
  <div class="page-head"><div class="container">
    <div class="breadcrumb"><a href="#/home">Home</a> / Courses</div>
    <h1 style="font-size:2rem;">Course catalog</h1>
    <p style="color:var(--ink-300)">Filter by category, level, or price to find the right course.</p>
  </div></div>
  <div class="container" style="padding:34px 0 80px;">
    <div class="filter-bar">
      <input type="text" id="fSearch" placeholder="Search courses..." style="flex:1;min-width:180px;">
      <select id="fCategory"><option value="all">All categories</option>${categories.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
      <select id="fLevel"><option value="all">All levels</option><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select>
      <select id="fPrice"><option value="all">Any price</option><option value="free">Free</option><option value="paid">Paid</option></select>
    </div>
    <div id="courseGrid" class="grid-3"></div>
  </div>`;
}
function renderCourseGrid(){
  let list = DB.courses.filter(c=>{
    if(listingFilters.category!=='all' && c.category!==listingFilters.category) return false;
    if(listingFilters.level!=='all' && c.level!==listingFilters.level) return false;
    if(listingFilters.price==='free' && c.price!==0) return false;
    if(listingFilters.price==='paid' && c.price===0) return false;
    if(listingFilters.q && !c.title.toLowerCase().includes(listingFilters.q.toLowerCase())) return false;
    return true;
  });
  const grid = document.getElementById('courseGrid');
  grid.innerHTML = list.length ? list.map(courseCard).join('') : `<div class="empty-state" style="grid-column:1/-1;"><div class="glyph">🔍</div>No courses match those filters.</div>`;
}
function afterCourses(){
  renderCourseGrid();
  document.getElementById('fCategory').onchange = e=>{ listingFilters.category=e.target.value; renderCourseGrid(); };
  document.getElementById('fLevel').onchange = e=>{ listingFilters.level=e.target.value; renderCourseGrid(); };
  document.getElementById('fPrice').onchange = e=>{ listingFilters.price=e.target.value; renderCourseGrid(); };
  document.getElementById('fSearch').oninput = e=>{ listingFilters.q=e.target.value; renderCourseGrid(); };
}

function getEnrollment(userId, courseId){ return DB.enrollments.find(e=>e.userId===userId && e.courseId===courseId); }
function totalLessons(c){ return c.curriculum.reduce((n,m)=>n+m.lessons.length,0); }
function courseCompleted(enr, c){
  if(!enr) return false;
  const total = totalLessons(c);
  const lessonsDone = total>0 && enr.progress.completedLessonIds.length >= total;
  const quizDone = !c.quiz || (enr.quizResult && enr.quizResult.passed);
  return lessonsDone && quizDone;
}
function recalcRating(c){
  if(!c.reviews.length){ c.rating = 0; return; }
  const sum = c.reviews.reduce((s,r)=>s+r.rating,0);
  c.rating = Math.round((sum/c.reviews.length)*10)/10;
}

      route();
    };

function enrollUser(userId, courseId, paymentInfo){

  DB.payments.push(payment);
  DB.enrollments.push({id:uid('enr'), userId, courseId, progress:{completedLessonIds:[]}, quizResult:null, enrolledAt:new Date().toISOString(), paymentId:payment.id});

}

let quizState = {answers:{}, submitted:false, index:0};
function viewQuiz(courseId){
  const c = DB.courses.find(x=>x.id===courseId);
  const u = currentUser();
  if(!c || !u) return `<div class="container" style="padding:80px 0;">Not available.</div>`;
  const enr = getEnrollment(u.id, c.id);
  if(!enr) return `<div class="container" style="padding:80px 0;">You are not enrolled in this course.</div>`;
  quizState = {answers:{}, submitted:false, index:0};
  return `<div class="container" style="padding:50px 0 100px;">
    <div class="breadcrumb"><a href="#/dashboard/student/learn/${c.id}">${c.title}</a> / Quiz</div>
    <div id="quizArea"></div>
  </div>`;
}
function renderQuiz(courseId){
  const c = DB.courses.find(x=>x.id===courseId);
  const q = c.quiz;
  const area = document.getElementById('quizArea');
  if(!quizState.submitted){
    const item = q.questions[quizState.index];
    area.innerHTML = `
    <div class="quiz-card">
      <div class="quiz-progress">Question ${quizState.index+1} of ${q.questions.length}</div>
      <h3>${q.title}</h3>
      <p style="font-weight:600;margin-bottom:16px;">${item.text}</p>
      ${item.options.map((opt,i)=>`<div class="opt-row ${quizState.answers[item.id]===i?'selected':''}" data-i="${i}"><span class="opt-letter">${String.fromCharCode(65+i)}</span><span>${opt}</span></div>`).join('')}
      <div style="display:flex;justify-content:space-between;margin-top:20px;">
        <button class="btn btn-ghost" id="prevQ" ${quizState.index===0?'disabled':''}>Previous</button>
        <button class="btn btn-primary" id="nextQ">${quizState.index===q.questions.length-1?'Submit quiz':'Next question'}</button>
      </div>
    </div>`;
    document.querySelectorAll('.opt-row').forEach(el=>{
      el.onclick=()=>{ quizState.answers[item.id]=parseInt(el.dataset.i); renderQuiz(courseId); };
    });
    document.getElementById('prevQ').onclick=()=>{ quizState.index--; renderQuiz(courseId); };
    document.getElementById('nextQ').onclick=()=>{
      if(quizState.answers[item.id]===undefined){ toast('Please select an answer.'); return; }
      if(quizState.index < q.questions.length-1){ quizState.index++; renderQuiz(courseId); }
      else{
        let correct=0;
        q.questions.forEach(qq=>{ if(quizState.answers[qq.id]===qq.correctIndex) correct++; });
        const score = Math.round((correct/q.questions.length)*100);
        const passed = score >= q.passScore;
        const u = currentUser(); const enr = getEnrollment(u.id, c.id);
        enr.quizResult = {score, passed, attempts:(enr.quizResult?enr.quizResult.attempts:0)+1, date:new Date().toISOString()};
        saveDB(DB);
        quizState.submitted = true; quizState.score=score; quizState.passed=passed; quizState.correct=correct;
        renderQuiz(courseId);
      }
    };
  } else {
    area.innerHTML = `
    <div class="quiz-card" style="text-align:center;">
      <div class="quiz-result-ring ${quizState.passed?'pass':'fail'}">${quizState.score}%</div>
      <h3>${quizState.passed?'Great work — you passed!':'Not quite — try again'}</h3>
      <p style="color:var(--ink-500);">You answered ${quizState.correct} of ${q.questions.length} questions correctly. Passing score: ${q.passScore}%.</p>
      <div style="text-align:left;margin-top:24px;">
        ${q.questions.map((item,qi)=>{
          const ua = quizState.answers[item.id];
          return `<p style="font-weight:600;margin-bottom:8px;">${qi+1}. ${item.text}</p>` +
            item.options.map((opt,i)=>{
              let cls='opt-row';
              if(i===item.correctIndex) cls+=' correct';
              else if(i===ua) cls+=' incorrect';
              return `<div class="${cls}"><span class="opt-letter">${String.fromCharCode(65+i)}</span><span>${opt}</span></div>`;
            }).join('');
        }).join('')}
      </div>

function enrollRow(e){
  const c = DB.courses.find(x=>x.id===e.courseId);

function openCourseModal(courseId){

  const overlay = document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML = `
  <div class="modal-box" style="position:relative;">
    <button class="close-x" id="closeModal">✕</button>
    <h3>${editing?'Edit course':'Create a new course'}</h3>

      <div class="field"><label>Category</label><input type="text" id="mCategory" value="${editing?editing.category:''}" placeholder="e.g. Web Development"></div>
      <div class="field"><label>Level</label><select id="mLevel"><option ${editing&&editing.level==='Beginner'?'selected':''}>Beginner</option><option ${editing&&editing.level==='Intermediate'?'selected':''}>Intermediate</option><option ${editing&&editing.level==='Advanced'?'selected':''}>Advanced</option></select></div>
    </div>
    <div class="field"><label>Price (BDT, 0 for free)</label><input type="number" id="mPrice" value="${editing?editing.price:0}"></div>
    <div class="field"><label>Summary</label><textarea id="mSummary" rows="3">${editing?editing.summary:''}</textarea></div>
    <p style="font-size:.78rem;color:var(--ink-500);">Lessons and quiz questions can be added after creating the course, via the sample structure included in this demo.</p>
    <button class="btn btn-primary btn-block" id="saveCourseBtn">${editing?'Save changes':'Create course'}</button>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('closeModal').onclick=()=>overlay.remove();
  overlay.onclick=(e)=>{ if(e.target===overlay) overlay.remove(); };
  document.getElementById('saveCourseBtn').onclick=()=>{
    const title = document.getElementById('mTitle').value.trim();
    const category = document.getElementById('mCategory').value.trim() || 'General';
    const level = document.getElementById('mLevel').value;
    const price = parseInt(document.getElementById('mPrice').value) || 0;
    const summary = document.getElementById('mSummary').value.trim();
    if(!title){ toast('Please enter a course title.'); return; }
    if(editing){
      Object.assign(editing, {title, category, level, price, summary});
      toast('Course updated.');
    } else {
      DB.courses.push({
        id: uid('c'), title, category, level, price, instructorId:u.id, instructorName:u.name,
        color:'linear-gradient(135deg,#2b3a67,#1b2540)', summary, rating:0, reviews:[],
        curriculum:[{id:'m1',title:'Module 1', lessons:[{id:'l1',title:'Introduction',type:'text',content:'Add your lesson content here.'}]}],
        quiz:{id:uid('q'),title:'Course Check',passScore:60,questions:[{id:uid('qq'),text:'Sample question — edit in a future update.',options:['Option A','Option B','Option C','Option D'],correctIndex:0}]}
      });
      toast('Course created.');
    }
    saveDB(DB); overlay.remove(); renderInstructorDashboard(['courses']);
  };
}

        ${qq.options.map((opt,oi)=>`<div style="font-size:.85rem;color:${oi===qq.correctIndex?'var(--success)':'var(--ink-300)'};">${String.fromCharCode(65+oi)}. ${opt} ${oi===qq.correctIndex?'(Correct)':''}</div>`).join('')}
      </div>
    `).join('')}
    <div class="auth-card" style="padding:18px;margin-top:16px;max-width:600px;">
      <h4>Add new question</h4>
      <div class="field"><label>Question text</label><input type="text" id="nqText"></div>
      <div class="two-col">
        <div class="field"><label>Option A</label><input type="text" id="nqA"></div>
        <div class="field"><label>Option B</label><input type="text" id="nqB"></div>
        <div class="field"><label>Option C</label><input type="text" id="nqC"></div>
        <div class="field"><label>Option D</label><input type="text" id="nqD"></div>
      </div>
      <div class="field"><label>Correct Answer</label><select id="nqCorrect"><option value="0">Option A</option><option value="1">Option B</option><option value="2">Option C</option><option value="3">Option D</option></select></div>
      <button class="btn btn-outline btn-block" id="addQBtn">+ Add question</button>
    </div>
    `;
    document.getElementById('saveQSettings').onclick=()=>{
      q.title = document.getElementById('qTitle').value || 'Course Quiz';
      q.passScore = parseInt(document.getElementById('qPass').value) || 60;
      saveDB(DB); toast('Settings saved.');
    };
    document.querySelectorAll('.delQBtn').forEach(b=>b.onclick=()=>{
      if(!confirm('Delete question?')) return;
      q.questions = q.questions.filter(x=>x.id!==b.dataset.q); saveDB(DB); renderEditorTab(courseId, 'quiz');
    });
    document.getElementById('addQBtn').onclick=()=>{
      const text = document.getElementById('nqText').value.trim();
      const opts = [document.getElementById('nqA').value.trim(), document.getElementById('nqB').value.trim(), document.getElementById('nqC').value.trim(), document.getElementById('nqD').value.trim()];
      if(!text || opts.some(x=>!x)){ toast('Fill all fields.'); return; }
      q.questions.push({id:uid('qq'), text, options:opts, correctIndex:parseInt(document.getElementById('nqCorrect').value)});
      saveDB(DB); renderEditorTab(courseId, 'quiz');
    };
  }
}

function openLessonModal(courseId, moduleId, lessonId){
  const c = DB.courses.find(x=>x.id===courseId);
  const m = c.curriculum.find(x=>x.id===moduleId);
  const l = lessonId ? m.lessons.find(x=>x.id===lessonId) : null;
  const overlay = document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML = `
  <div class="modal-box" style="position:relative;">
    <button class="close-x" id="closeLModal">✕</button>
    <h3>${l?'Edit lesson':'Add lesson'}</h3>
    <div class="field"><label>Title</label><input type="text" id="lTitle" value="${l?l.title:''}"></div>
    <div class="field"><label>Type</label><select id="lType"><option value="video" ${l&&l.type==='video'?'selected':''}>Video</option><option value="text" ${l&&l.type==='text'?'selected':''}>Text</option></select></div>
    <div class="field"><label>Duration (for video)</label><input type="text" id="lDur" value="${l?l.duration||'':''}" placeholder="e.g. 10:30"></div>
    <div class="field"><label>Text Content</label><textarea id="lContent" rows="5" placeholder="Only for text lessons...">${l?l.content||'':''}</textarea></div>
    <button class="btn btn-primary btn-block" id="saveLBtn">${l?'Save lesson':'Add lesson'}</button>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('closeLModal').onclick=()=>overlay.remove();
  document.getElementById('saveLBtn').onclick=()=>{
    const title = document.getElementById('lTitle').value.trim();
    if(!title) return toast('Please enter a title');
    const data = {
      title,
      type: document.getElementById('lType').value,
      duration: document.getElementById('lDur').value,
      content: document.getElementById('lContent').value
    };
    if(l){ Object.assign(l, data); }
    else { m.lessons.push({id:uid('l'), ...data}); }
    saveDB(DB); overlay.remove(); renderEditorTab(courseId, 'curriculum');
  };
}

/* ======================= THEME + NAV TOGGLES ======================= */
document.getElementById('themeBtn').onclick = ()=>{
  const body = document.body;
  const next = body.dataset.theme==='dark' ? 'light' : 'dark';
  body.dataset.theme = next;
  localStorage.setItem('verhal_theme', next);
};
(function initTheme(){
  const saved = localStorage.getItem('verhal_theme');
  if(saved) document.body.dataset.theme = saved;
})();
document.getElementById('mobileToggle').onclick = ()=>{
  document.getElementById('navLinks').classList.toggle('open');
};

/* init */
route();
</script>
